<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulado AWS Developer Associate – DVA-C02</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☁️</text></svg>" />
  <style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --orange: #ff9900;
  --green: #3fb950;
  --red: #f85149;
  --blue: #58a6ff;
  --radius: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* HEADER */
.header {
  background: #232f3e;
  border-bottom: 2px solid var(--orange);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.header h1 { font-size: 1.05rem; font-weight: 700; }
.header p { font-size: 0.75rem; color: var(--text-muted); }
.header-badge {
  margin-left: auto;
  background: var(--orange);
  color: #000;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 3px 12px;
  border-radius: 999px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  white-space: nowrap;
}

/* CONTAINER */
.container {
  max-width: 760px;
  margin: 0 auto;
  padding: 28px 20px 80px;
}

/* PROGRESS */
.progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.progress-meta span:last-child { color: var(--orange); }
.progress-track {
  height: 6px;
  background: var(--surface2);
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 24px;
}
.progress-bar {
  height: 100%;
  background: var(--orange);
  border-radius: 999px;
  transition: width 0.4s ease;
}

/* CARD */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 26px;
  margin-bottom: 16px;
}
.question-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.topic-badge {
  background: rgba(255,153,0,0.15);
  color: var(--orange);
  font-size: 0.72rem;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 999px;
  border: 1px solid rgba(255,153,0,0.3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.question-number { font-size: 0.8rem; color: var(--text-muted); }
.question-text {
  font-size: 0.975rem;
  line-height: 1.75;
  margin-bottom: 22px;
}

/* OPTIONS */
.options { display: flex; flex-direction: column; gap: 10px; }
.opt-btn {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  text-align: left;
  color: var(--text);
  font-family: inherit;
  font-size: 0.875rem;
  line-height: 1.55;
  transition: border-color 0.15s, background 0.15s;
  width: 100%;
}
.opt-btn:not(:disabled):hover {
  border-color: var(--orange);
  background: rgba(255,153,0,0.06);
}
.opt-btn:disabled { cursor: default; }
.opt-letter {
  flex-shrink: 0;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text-muted);
  margin-top: 1px;
}
.opt-btn.selected { border-color: var(--blue); background: rgba(88,166,255,0.1); }
.opt-btn.selected .opt-letter { background: var(--blue); border-color: var(--blue); color: #000; }
.opt-btn.correct { border-color: var(--green); background: rgba(63,185,80,0.1); }
.opt-btn.correct .opt-letter { background: var(--green); border-color: var(--green); color: #000; }
.opt-btn.wrong { border-color: var(--red); background: rgba(248,81,73,0.1); }
.opt-btn.wrong .opt-letter { background: var(--red); border-color: var(--red); color: #fff; }

/* EXPLANATION */
.explanation {
  display: none;
  margin-top: 16px;
  background: rgba(88,166,255,0.07);
  border: 1px solid rgba(88,166,255,0.25);
  border-radius: var(--radius);
  padding: 16px 18px;
  font-size: 0.875rem;
  line-height: 1.7;
}
.explanation strong { color: var(--blue); display: block; margin-bottom: 6px; }

/* NAVIGATION */
.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.nav-center { display: flex; gap: 10px; }
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: opacity 0.15s, transform 0.1s;
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-ghost { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
.btn-ghost:not(:disabled):hover { color: var(--text); }
.btn-primary { background: var(--orange); color: #000; }
.btn-primary:not(:disabled):hover { opacity: 0.88; }
.btn-reveal { background: rgba(88,166,255,0.15); color: var(--blue); border: 1px solid rgba(88,166,255,0.3); }
.btn-finish { background: var(--green); color: #000; }

/* RESULTS */
#results-screen { display: none; }
.results-hero {
  text-align: center;
  padding: 36px 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 20px;
}
.score-pct { font-size: 5rem; font-weight: 800; line-height: 1; margin-bottom: 10px; letter-spacing: -0.04em; }
.score-pct.pass { color: var(--green); }
.score-pct.fail { color: var(--red); }
.score-label { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
.score-sub { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 4px; }

.breakdown-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 24px;
  margin-bottom: 20px;
}
.breakdown-card h3 {
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 18px;
}
.topic-row {
  display: grid;
  grid-template-columns: 130px 46px 1fr 44px;
  gap: 10px;
  align-items: center;
  margin-bottom: 10px;
}
.topic-name { font-size: 0.85rem; font-weight: 500; }
.topic-score { font-size: 0.8rem; color: var(--text-muted); text-align: right; }
.topic-bar-wrap { height: 8px; background: var(--surface2); border-radius: 999px; overflow: hidden; }
.topic-bar { height: 100%; border-radius: 999px; transition: width 0.8s ease; }
.topic-pct { font-size: 0.78rem; font-weight: 600; color: var(--text-muted); text-align: right; }
.results-actions { display: flex; justify-content: center; gap: 12px; margin-top: 4px; }

@media (max-width: 600px) {
  .card { padding: 18px 14px; }
  .score-pct { font-size: 3.5rem; }
  .topic-row { grid-template-columns: 90px 36px 1fr 36px; }
  .nav-row { flex-direction: column; }
  .nav-center { width: 100%; justify-content: center; }
}
  </style>
</head>
<body>

<header class="header">
  <div>
    <h1>☁️ AWS Developer Associate</h1>
    <p>Simulado DVA-C02 em Português</p>
  </div>
  <span class="header-badge">20 questões</span>
</header>

<!-- QUIZ -->
<div class="container" id="quiz-screen">
  <div class="progress-meta">
    <span id="progress-text">0/20 respondidas</span>
    <span>Aprovação: 72%</span>
  </div>
  <div class="progress-track">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>

  <div class="card">
    <div class="question-meta">
      <span class="topic-badge" id="topic-badge"></span>
      <span class="question-number" id="question-number"></span>
    </div>
    <p class="question-text" id="question-text"></p>
    <div class="options" id="options"></div>
    <div class="explanation" id="explanation"></div>
  </div>

  <div class="nav-row">
    <button class="btn btn-ghost" id="btn-prev">← Anterior</button>
    <div class="nav-center">
      <button class="btn btn-reveal" id="btn-reveal" style="display:none">Ver Resposta</button>
      <button class="btn btn-primary" id="btn-next">Próxima →</button>
      <button class="btn btn-finish" id="btn-finish" style="display:none">Ver Resultado ✓</button>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div class="container" id="results-screen">
  <div class="results-hero">
    <div class="score-pct" id="score-pct"></div>
    <div class="score-label" id="score-label"></div>
    <div class="score-sub" id="score-detail"></div>
    <div class="score-sub" id="score-time"></div>
    <div class="score-sub" style="opacity:0.6;font-size:0.75rem;margin-top:4px">Nota mínima: 72%</div>
  </div>
  <div class="breakdown-card">
    <h3>Desempenho por Tópico</h3>
    <div id="topic-breakdown"></div>
  </div>
  <div class="results-actions">
    <button class="btn btn-primary" id="btn-restart">🔄 Novo Simulado</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// BANCO DE QUESTÕES
// ═══════════════════════════════════════════════════════════
const questions = [
  {
    id: 1, topic: "Lambda",
    question: "Você está desenvolvendo uma função AWS Lambda que processa eventos do Amazon SQS. Ao testar, percebe que a função é invocada mais vezes do que o esperado quando mensagens falham. Qual é a causa mais provável?",
    options: [
      "A fila SQS possui um Dead Letter Queue (DLQ) mal configurado",
      "O Lambda está com timeout muito baixo, gerando reprocessamento automático",
      "O maxReceiveCount da fila SQS não foi configurado, causando retenativas indefinidas",
      "O Lambda não tem permissão para deletar mensagens da fila após o processamento"
    ],
    correct: 2,
    explanation: "Quando o Lambda falha ao processar uma mensagem SQS, a mensagem fica visível novamente após o Visibility Timeout. Sem configurar maxReceiveCount e um DLQ, a mensagem pode ser reprocessada indefinidamente. O correto é configurar maxReceiveCount e um DLQ para capturar mensagens que falham repetidamente."
  },
  {
    id: 2, topic: "DynamoDB",
    question: "Uma aplicação usa DynamoDB e precisa buscar itens usando um atributo que não é a chave primária. Qual abordagem é a mais eficiente?",
    options: [
      "Usar Scan com um FilterExpression",
      "Criar um Global Secondary Index (GSI) no atributo e usar Query",
      "Usar BatchGetItem com o atributo desejado",
      "Criar uma nova tabela com o atributo como chave primária"
    ],
    correct: 1,
    explanation: "Um Global Secondary Index (GSI) permite realizar operações de Query em atributos que não são a chave primária. Isso é muito mais eficiente do que um Scan, que lê todos os itens da tabela e consome muita capacidade de leitura."
  },
  {
    id: 3, topic: "API Gateway",
    question: "Você precisa que sua API REST no API Gateway retorne respostas diferentes dependendo do Content-Type aceito pelo cliente (JSON ou XML). Qual recurso deve ser usado?",
    options: [
      "Stage Variables para alternar entre backends diferentes",
      "Integration Response com mapeamento por header Accept",
      "Mapping Templates no Integration Response via VTL",
      "Lambda Authorizer para detectar o Content-Type e redirecionar"
    ],
    correct: 2,
    explanation: "Mapping Templates no API Gateway permitem transformar a resposta com base em parâmetros da requisição, incluindo o header Accept. Você pode configurar templates para application/json e application/xml usando VTL (Velocity Template Language)."
  },
  {
    id: 4, topic: "S3",
    question: "Um desenvolvedor precisa garantir que objetos no S3 sejam criptografados com chave gerenciada pelo cliente e rotacionada anualmente. Qual solução atende?",
    options: [
      "SSE-S3 com política de bucket obrigando criptografia",
      "SSE-KMS usando Customer Managed Key (CMK) com rotação automática anual habilitada",
      "SSE-C enviando a chave no header de cada upload",
      "Criptografia client-side com chave armazenada no Secrets Manager"
    ],
    correct: 1,
    explanation: "SSE-KMS com Customer Managed Key (CMK) permite controlar a chave, configurar políticas de acesso e habilitar rotação automática anual. O KMS gerencia o ciclo de vida enquanto o cliente mantém o controle. SSE-S3 usa chaves gerenciadas pela AWS."
  },
  {
    id: 5, topic: "CodeDeploy",
    question: "Sua equipe usa CodeDeploy em EC2. Durante um deploy, você precisa parar serviços dependentes ANTES do novo código ser instalado. Em qual lifecycle event hook isso deve ser configurado?",
    options: [
      "BeforeInstall",
      "AfterInstall",
      "ApplicationStart",
      "ValidateService"
    ],
    correct: 0,
    explanation: "BeforeInstall é o hook correto para tarefas de preparação antes da instalação, como parar serviços dependentes. A ordem é: BeforeInstall → AfterInstall → ApplicationStart → ValidateService."
  },
  {
    id: 6, topic: "SQS",
    question: "Uma aplicação de e-commerce processa pedidos via SQS e você nota cobranças duplicadas por processamento duplo de mensagens. Como resolver de forma mais confiável?",
    options: [
      "Diminuir o Visibility Timeout para que mensagens sejam reprocessadas mais rápido",
      "Usar SQS FIFO com deduplication ID baseado no ID do pedido",
      "Aumentar o número de consumidores para processar mensagens mais rápido",
      "Implementar uma Dead Letter Queue para capturar duplicatas"
    ],
    correct: 1,
    explanation: "SQS FIFO com Message Deduplication ID garante entrega única de mensagens com o mesmo ID em um intervalo de 5 minutos. Usando o ID único do pedido como deduplication ID, elimina-se o processamento duplicado. Filas Standard garantem 'at least once', não 'exactly once'."
  },
  {
    id: 7, topic: "CloudFormation",
    question: "Você tem um template CloudFormation que cria recursos em múltiplas regiões e precisa condicionar a criação de recursos por região. Qual recurso usar?",
    options: [
      "Mappings com Fn::FindInMap referenciando a região atual",
      "Parameters com AllowedValues limitando as regiões",
      "Conditions com Fn::Equals comparando AWS::Region e Fn::If nos recursos",
      "Nested Stacks separados por região"
    ],
    correct: 2,
    explanation: "Conditions no CloudFormation permitem definir condições baseadas em pseudo-parâmetros como AWS::Region. Com Fn::Equals você cria condições (ex: IsUSEast1) e usa Fn::If nos recursos para criar ou não dependendo da região."
  },
  {
    id: 8, topic: "Elastic Beanstalk",
    question: "Você faz deploy no Elastic Beanstalk e precisa garantir zero downtime com economia de custos, sem manter instâncias extras permanentemente. Qual política de deploy usar?",
    options: [
      "All at once — deploy em todas as instâncias simultaneamente",
      "Rolling — atualiza instâncias em lotes mantendo capacidade parcial",
      "Rolling with additional batch — adiciona instâncias temporárias durante o deploy",
      "Immutable — cria um novo Auto Scaling Group paralelo"
    ],
    correct: 2,
    explanation: "Rolling with additional batch inicia um novo lote de instâncias antes de atualizar as existentes, mantendo capacidade total (zero downtime). As instâncias adicionais são terminadas após o deploy, controlando custos. Immutable também garante zero downtime mas custa mais."
  },
  {
    id: 9, topic: "IAM",
    question: "Uma função Lambda precisa acessar um bucket S3 em outra conta AWS. Qual é a abordagem correta para esse acesso cross-account?",
    options: [
      "Criar um usuário IAM na conta do S3 e armazenar credenciais no Secrets Manager da Lambda",
      "Configurar a bucket policy do S3 para permitir a role da Lambda E garantir que a Lambda role tenha permissão de S3",
      "Criar uma VPC Peering entre as duas contas",
      "Usar Access Points do S3 com política de acesso cross-account"
    ],
    correct: 1,
    explanation: "Para acesso cross-account ao S3, são necessárias permissões em AMBOS os lados: (1) a bucket policy da conta de destino deve permitir o ARN da role da Lambda, e (2) a execution role da Lambda deve ter permissões de S3. Apenas um dos lados configurado não é suficiente."
  },
  {
    id: 10, topic: "DynamoDB",
    question: "Uma aplicação de jogos armazena pontuações no DynamoDB com leituras muito frequentes dos top 10 jogadores. As RCUs estão se esgotando. Como otimizar?",
    options: [
      "Usar Strongly Consistent Reads para garantir dados atualizados",
      "Implementar DAX (DynamoDB Accelerator) na frente da tabela",
      "Aumentar o número de RCUs da tabela",
      "Migrar manualmente os dados do leaderboard para ElastiCache Redis"
    ],
    correct: 1,
    explanation: "DAX é um cache em memória totalmente gerenciado e compatível com DynamoDB com latência de microssegundos. Para leaderboards com leituras frequentes dos mesmos itens, o DAX é ideal: absorve leituras repetidas sem consumir RCUs da tabela."
  },
  {
    id: 11, topic: "SNS",
    question: "Você precisa enviar notificações para múltiplos sistemas (email, SQS, Lambda) quando um evento ocorre. Qual é a arquitetura correta com SNS?",
    options: [
      "Criar um tópico SNS e configurar subscriptions para cada destino",
      "Enviar mensagens individuais para cada destino via SDK",
      "Usar SNS FIFO com um único subscriber que distribui internamente",
      "Configurar SNS como trigger direto do CloudWatch Events"
    ],
    correct: 0,
    explanation: "O padrão pub/sub do SNS permite criar um tópico e configurar múltiplas subscriptions (email, SQS, Lambda, HTTP/S, SMS). Quando uma mensagem é publicada, o SNS entrega para todos os subscribers — padrão fan-out, desacoplando produtor dos consumidores."
  },
  {
    id: 12, topic: "X-Ray",
    question: "Você precisa rastrear uma requisição que passa por API Gateway → Lambda → DynamoDB para identificar latência. Qual configuração mínima é necessária?",
    options: [
      "Habilitar X-Ray no API Gateway apenas, pois ele rastreia toda a cadeia automaticamente",
      "Habilitar X-Ray tracing no API Gateway e na Lambda, e usar o AWS SDK com X-Ray instrumentation",
      "Instalar o X-Ray daemon em todas as instâncias EC2 da VPC",
      "Usar CloudWatch Insights com filtros de latência para cada serviço"
    ],
    correct: 1,
    explanation: "Para rastreamento end-to-end: (1) habilitar X-Ray active tracing no API Gateway, (2) habilitar X-Ray active tracing na Lambda, e (3) usar o X-Ray SDK no código para instrumentar chamadas ao DynamoDB. O X-Ray correlaciona traces através de um Trace ID propagado nos headers."
  },
  {
    id: 13, topic: "Cognito",
    question: "Sua aplicação mobile precisa que usuários façam login com Google e depois acessem S3 e DynamoDB diretamente. Qual é a arquitetura correta com Cognito?",
    options: [
      "Cognito User Pool para autenticação com Google + Cognito Identity Pool para credenciais AWS temporárias",
      "Cognito Identity Pool apenas, pois integra nativamente com Google Login",
      "Cognito User Pool apenas, pois fornece tokens aceitos pelo S3 e DynamoDB",
      "IAM Identity Federation direto com Google sem necessidade do Cognito"
    ],
    correct: 0,
    explanation: "A arquitetura usa dois serviços: (1) Cognito User Pool com federação Google para autenticar usuários e emitir tokens JWT, e (2) Cognito Identity Pool para trocar tokens por credenciais AWS temporárias via STS. Com credenciais temporárias, o app acessa S3, DynamoDB etc. com as permissões da IAM role configurada."
  },
  {
    id: 14, topic: "CloudWatch",
    question: "Uma Lambda function está falhando com 'Task timed out'. Quais métricas do CloudWatch você deve analisar para diagnosticar o problema?",
    options: [
      "Lambda Duration e Lambda Errors para ver se o timeout está próximo do limite configurado",
      "EC2 CPUUtilization e NetworkIn para a instância subjacente da Lambda",
      "Lambda Duration, Lambda Throttles e Lambda ConcurrentExecutions",
      "CloudTrail logs para ver quais APIs foram chamadas antes do timeout"
    ],
    correct: 2,
    explanation: "Para diagnosticar timeouts no Lambda, analise: Duration (se está próxima do timeout configurado), Throttles (se a Lambda está sendo throttled por limite de concorrência) e ConcurrentExecutions (se atingiu o limite de conta/função). Throttling pode causar atrasos que levam ao timeout."
  },
  {
    id: 15, topic: "ECS",
    question: "Um container no ECS Fargate precisa acessar um banco RDS com senha rotacionada automaticamente a cada 30 dias. Como configurar corretamente?",
    options: [
      "Armazenar a senha como variável de ambiente na Task Definition",
      "Usar Secrets Manager com rotação automática e referenciar o secret ARN na Task Definition",
      "Usar Parameter Store (SecureString) e passar como env var no entrypoint",
      "Hardcodar a senha na imagem Docker e redeployar após cada rotação"
    ],
    correct: 1,
    explanation: "Secrets Manager suporta rotação automática de credenciais de banco (integrado com RDS) e pode ser referenciado diretamente na Task Definition do ECS. O ECS injeta o valor como variável de ambiente em runtime, buscando sempre a versão mais atual, sem necessidade de redeploy."
  },
  {
    id: 16, topic: "SQS",
    question: "Uma Lambda processa mensagens de uma fila SQS Standard e é throttled durante um pico. O que acontece com as mensagens SQS nesse cenário?",
    options: [
      "As mensagens são perdidas permanentemente",
      "As mensagens ficam invisíveis até o Visibility Timeout expirar e voltam a ficar disponíveis",
      "O SQS automaticamente escala o Lambda para processar todas as mensagens",
      "As mensagens são movidas automaticamente para um DLQ"
    ],
    correct: 1,
    explanation: "Quando o Lambda é throttled, ele retorna erro ao SQS. As mensagens ficam invisíveis pelo Visibility Timeout e depois voltam a ficar disponíveis para nova tentativa. O Event Source Mapping faz backoff exponencial. As mensagens só vão para o DLQ após exceder o maxReceiveCount."
  },
  {
    id: 17, topic: "API Gateway",
    question: "Você precisa proteger uma API no API Gateway para que apenas clientes com chave válida possam acessá-la, com cotas diferentes por cliente. Como implementar?",
    options: [
      "Lambda Authorizer que verifica um header customizado com a chave",
      "API Keys com Usage Plans configurando cotas e throttling por plano",
      "Cognito User Pools com diferentes grupos tendo permissões distintas",
      "WAF rules com rate limiting por IP de origem"
    ],
    correct: 1,
    explanation: "API Keys associadas a Usage Plans é o mecanismo nativo do API Gateway para controle com cotas diferenciadas. Um Usage Plan define throttling (req/seg) e quota (req/mês) e pode ter múltiplas API Keys. Cada cliente recebe uma chave associada a um plano com sua cota. A chave é enviada no header x-api-key."
  },
  {
    id: 18, topic: "CodePipeline",
    question: "Sua pipeline CI/CD no CodePipeline executa testes de integração com banco de dados real, e eles falham aleatoriamente por condições de corrida. Qual abordagem melhora a confiabilidade?",
    options: [
      "Aumentar o timeout do stage de testes na pipeline",
      "Usar CodeBuild com banco de dados RDS criado/destruído por CloudFormation a cada execução",
      "Executar os testes em paralelo para reduzir o tempo total",
      "Mover os testes de integração para fora da pipeline e executar manualmente"
    ],
    correct: 1,
    explanation: "Usar CloudFormation para criar um ambiente de banco isolado para cada execução de pipeline elimina condições de corrida entre execuções. O CodeBuild pode criar o RDS antes dos testes e destruí-lo após, garantindo isolamento e reprodutibilidade."
  },
  {
    id: 19, topic: "Lambda",
    question: "Uma Lambda faz chamadas a um serviço externo que retorna erros 429 (Too Many Requests) ocasionalmente. Qual é a melhor prática para lidar com isso?",
    options: [
      "Ignorar o erro e retornar sucesso para evitar reprocessamento",
      "Implementar retry com exponential backoff e jitter no código da Lambda",
      "Aumentar o timeout da Lambda para dar mais tempo ao serviço externo",
      "Usar um Lambda Layer compartilhado com lógica de retry global"
    ],
    correct: 1,
    explanation: "Exponential backoff com jitter é o padrão recomendado para erros de throttling. O backoff aumenta progressivamente o tempo entre tentativas (1s, 2s, 4s...) e o jitter adiciona aleatoriedade para evitar thundering herd. O AWS SDK implementa isso automaticamente para serviços AWS, mas deve ser implementado manualmente para APIs externas."
  },
  {
    id: 20, topic: "CloudFormation",
    question: "Durante um update de stack CloudFormation, um recurso de banco de dados precisa ser substituído (replacement). O que acontece com os dados existentes?",
    options: [
      "CloudFormation faz backup automático antes de substituir o recurso",
      "O recurso antigo é deletado e um novo é criado, perdendo os dados sem backups externos",
      "CloudFormation detecta que é um banco e preserva os dados automaticamente via snapshot",
      "O update falha automaticamente para proteger os dados"
    ],
    correct: 1,
    explanation: "Quando uma propriedade que requer replacement é alterada, o CloudFormation cria um novo recurso e deleta o antigo. Para RDS, use DeletionPolicy: Snapshot para criar snapshot antes de deletar, ou DeletionPolicy: Retain para manter o recurso. Nunca faça updates com replacement em bancos de produção sem DeletionPolicy configurada."
  }
];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const state = {
  current: 0,
  answers: {},
  revealed: {},
  shuffled: [],
  startTime: null
};

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function $(id) { return document.getElementById(id); }

function updateProgress() {
  const total = state.shuffled.length;
  const answered = Object.keys(state.answers).length;
  const pct = Math.round((answered / total) * 100);
  $('progress-bar').style.width = pct + '%';
  $('progress-text').textContent = answered + '/' + total + ' respondidas';
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function renderQuestion() {
  const q = state.shuffled[state.current];
  const total = state.shuffled.length;
  const isRevealed = state.revealed[state.current];
  const userAnswer = state.answers[state.current];

  $('topic-badge').textContent = q.topic;
  $('question-number').textContent = 'Questão ' + (state.current + 1) + ' de ' + total;
  $('question-text').textContent = q.question;

  // Options
  const optionsEl = $('options');
  optionsEl.innerHTML = '';
  q.options.forEach(function(opt, i) {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';

    const letter = String.fromCharCode(65 + i);
    const letterSpan = document.createElement('span');
    letterSpan.className = 'opt-letter';
    letterSpan.textContent = letter;

    const textSpan = document.createElement('span');
    textSpan.textContent = opt;

    btn.appendChild(letterSpan);
    btn.appendChild(textSpan);

    if (isRevealed) {
      if (i === q.correct) btn.classList.add('correct');
      else if (i === userAnswer && userAnswer !== q.correct) btn.classList.add('wrong');
      btn.disabled = true;
    } else if (userAnswer !== undefined) {
      if (i === userAnswer) btn.classList.add('selected');
      btn.disabled = true;
    } else {
      btn.addEventListener('click', function() { selectAnswer(i); });
    }

    optionsEl.appendChild(btn);
  });

  // Explanation
  const expEl = $('explanation');
  if (isRevealed) {
    expEl.innerHTML = '<strong>📖 Explicação</strong>' + q.explanation;
    expEl.style.display = 'block';
  } else {
    expEl.style.display = 'none';
  }

  // Buttons
  $('btn-prev').disabled = state.current === 0;

  const isLast = state.current === total - 1;
  const allAnswered = Object.keys(state.answers).length === total;

  $('btn-next').style.display = isLast ? 'none' : 'inline-flex';
  $('btn-finish').style.display = (isLast && allAnswered) ? 'inline-flex' : 'none';
  $('btn-reveal').style.display = (userAnswer !== undefined && !isRevealed) ? 'inline-flex' : 'none';
}

function selectAnswer(index) {
  if (state.answers[state.current] !== undefined) return;
  state.answers[state.current] = index;
  updateProgress();
  renderQuestion();
}

function navigate(dir) {
  const next = state.current + dir;
  if (next >= 0 && next < state.shuffled.length) {
    state.current = next;
    renderQuestion();
  }
}

// ═══════════════════════════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════════════════════════
function showResults() {
  const elapsed = Math.round((Date.now() - state.startTime) / 1000);
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;

  const total = state.shuffled.length;
  let correct = 0;
  const byTopic = {};

  state.shuffled.forEach(function(q, i) {
    if (!byTopic[q.topic]) byTopic[q.topic] = { correct: 0, total: 0 };
    byTopic[q.topic].total++;
    if (state.answers[i] === q.correct) {
      correct++;
      byTopic[q.topic].correct++;
    }
  });

  const pct = Math.round((correct / total) * 100);
  const passed = pct >= 72;

  $('quiz-screen').style.display = 'none';
  $('results-screen').style.display = 'block';

  $('score-pct').textContent = pct + '%';
  $('score-pct').className = 'score-pct ' + (passed ? 'pass' : 'fail');
  $('score-label').textContent = passed ? '✅ APROVADO' : '❌ REPROVADO';
  $('score-detail').textContent = correct + ' de ' + total + ' corretas';
  $('score-time').textContent = '⏱ Tempo: ' + mins + 'min ' + secs + 's';

  const topicEl = $('topic-breakdown');
  topicEl.innerHTML = '';
  Object.keys(byTopic).sort().forEach(function(topic) {
    const data = byTopic[topic];
    const tp = Math.round((data.correct / data.total) * 100);
    const color = tp >= 72 ? 'var(--green)' : 'var(--red)';
    const row = document.createElement('div');
    row.className = 'topic-row';
    row.innerHTML =
      '<span class="topic-name">' + topic + '</span>' +
      '<span class="topic-score">' + data.correct + '/' + data.total + '</span>' +
      '<div class="topic-bar-wrap"><div class="topic-bar" style="width:' + tp + '%;background:' + color + '"></div></div>' +
      '<span class="topic-pct">' + tp + '%</span>';
    topicEl.appendChild(row);
  });
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
function init() {
  state.shuffled = questions.slice().sort(function() { return Math.random() - 0.5; });
  state.current = 0;
  state.answers = {};
  state.revealed = {};
  state.startTime = Date.now();
  $('quiz-screen').style.display = 'block';
  $('results-screen').style.display = 'none';
  updateProgress();
  renderQuestion();
}

$('btn-prev').addEventListener('click', function() { navigate(-1); });
$('btn-next').addEventListener('click', function() { navigate(1); });
$('btn-reveal').addEventListener('click', function() {
  state.revealed[state.current] = true;
  renderQuestion();
});
$('btn-finish').addEventListener('click', showResults);
$('btn-restart').addEventListener('click', init);

init();
</script>
</body>
</html>
